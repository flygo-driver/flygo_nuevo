name: flygo_nuevo
description: Aplicación FlyGo para viajes largos.
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # i18n
  intl: ^0.20.2

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.7.10
  cloud_functions: ^4.7.6

  # Geolocalización y Mapas
  geolocator: ^12.0.0
  geocoding: ^4.0.0
  google_maps_flutter: ^2.13.1

  # REST / Autocomplete
  http: ^1.5.0

  # Utilidades
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.2
  signature: ^5.5.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  google_sign_in: ^6.2.1

  # (Opcional) Mapas alternativos
  flutter_map: ^8.2.1
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    # APK + Splash usarán el padded
    - assets/icon/icon_foreground_padded.png
    # Bienvenida: paracaídas + logo de la palabra
    - assets/icon/paracaida_color.png
    - assets/icon/logo_flygo.png

# ---------- Icono APK (sin zoom/recorte) ----------
flutter_launcher_icons:
  android: true
  ios: false
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icon/icon_foreground_padded.png
  image_path: assets/icon/icon_foreground_padded.png
  min_sdk_android: 21

# ---------- Splash al abrir (mismo logo padded del APK) ----------
flutter_native_splash:
  color: "#000000"
  image: assets/icon/icon_foreground_padded.png
  android_gravity: center
  android_12:
    image: assets/icon/icon_foreground_padded.png
    icon_background_color: "#000000"
  fullscreen: true
