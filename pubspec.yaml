name: flygo_nuevo  # ← NO lo cambies
description: RAI Driver — app de movilidad para clientes y taxistas.
version: 2.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # i18n
  intl: ^0.20.2

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.7.10
  cloud_functions: ^4.7.6

  # Geolocalización y Mapas
  geolocator: ^12.0.0
  geocoding: ^4.0.0
  google_maps_flutter: ^2.13.1

  # REST / Autocomplete
  http: ^1.5.0
  uuid: ^4.5.1

  # Google Places SDK
  flutter_google_places_sdk: ^0.3.2

  # Utilidades
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.2
  signature: ^5.5.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  google_sign_in: ^6.2.1

  # Mapas alternativos (opcional)
  flutter_map: ^8.2.1
  latlong2: ^0.9.1

  # Timbre + info del paquete
  audioplayers: ^5.2.1
  package_info_plus: ^8.0.0
  firebase_crashlytics: ^3.5.7
  share_plus: ^10.0.0
  video_player: ^2.9.2
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/notification.wav     # Timbre in-app (mismo tono que res/raw en Android)
    - assets/icon/icono_app_R.png        # R sola (icono app y appbar)
    - assets/icon/paracaida_color.png    # Paracaídas (pantalla bienvenida)
    - assets/icon/splash_rai.png         # R + RAI + "Movilidad Inteligente" (splash)
    - assets/icon/logo_rai_vertical.png  # R arriba + RAI abajo (pantalla bienvenida)

# ---------- ICONO DE LA APP (R sola) ----------
flutter_launcher_icons:
  android: true
  ios: false
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icon/icono_app_R.png
  image_path: assets/icon/icono_app_R.png
  min_sdk_android: 21

# ---------- SPLASH SCREEN (Logo RAI con texto) ----------
flutter_native_splash:
  color: "#000000"
  image: assets/icon/splash_rai.png      # R + RAI + "Movilidad Inteligente"
  android_gravity: center
  android_12:
    image: assets/icon/splash_rai.png
    icon_background_color: "#000000"
  fullscreen: true