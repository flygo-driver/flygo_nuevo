# Reglas del analizador para RAI Driver (producción)
# Mantiene correctitud y baja ruido visual.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - lib/**.g.dart
    - lib/**.freezed.dart
    - lib/generated_plugin_registrant.dart

  errors:
    # Importantes:
    use_build_context_synchronously: warning
    deprecated_member_use: warning
    unused_import: warning
    unused_element: warning
    dead_code: warning

    # Silenciar estilo de nombres:
    constant_identifier_names: ignore
    non_constant_identifier_names: ignore
    no_leading_underscores_for_local_identifiers: ignore

    # Ya habíamos silenciado esto:
    prefer_single_quotes: ignore

    # Sugerencias de performance (solo info):
    unnecessary_await_in_return: info
    prefer_const_constructors: info
    prefer_const_literals_to_create_immutables: info
    prefer_const_constructors_in_immutables: info

linter:
  rules:
    avoid_print: true
    await_only_futures: true
    cancel_subscriptions: true
    close_sinks: true
    prefer_final_fields: true
    prefer_final_locals: true
    always_declare_return_types: true
