name: flutter_google_places_sdk_web
description: Local web stub for flutter_google_places_sdk_web.
version: 0.1.3
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_google_places_sdk_platform_interface: ^0.2.7

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FlutterGooglePlacesSdkWebPlugin
        fileName: flutter_google_places_sdk_web.dart
